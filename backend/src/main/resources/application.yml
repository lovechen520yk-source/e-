server:
  port: 8080
  tomcat:
    # Tomcat 线程池配置 - 支持多用户并发访问
    threads:
      max: 200          # 最大工作线程数（默认200）
      min-spare: 10     # 最小空闲线程数
    max-connections: 2000  # 最大连接数
    accept-count: 100     # 等待队列长度
    connection-timeout: 20000  # 连接超时(ms)

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/worktime_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&cachePrepStmts=true&useServerPrepStmts=true&rewriteBatchedStatements=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: WorktimeHikariCP
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3s
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 0
          max-wait: 5s
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.etimesheet.entity
  configuration:
    map-underscore-to-camel-case: true
    # 生产环境关闭 SQL 日志，改为使用 logging.level 细粒度控制
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# 文件上传路径配置
file:
  upload-dir: ./uploads

# JWT 密钥（生产环境务必修改为随机长字符串）
jwt:
  secret: EtimetableSecretKey2024VeryLongSecretKeyForHMAC

# 微信开放平台配置
wechat:
  app-id: your_app_id
  app-secret: your_app_secret
  redirect-uri: http://your-domain.com/api/auth/wechat/callback

# 异步线程池配置（由 AsyncConfig.java 读取）
async:
  executor:
    core-pool-size: 10      # 核心线程数
    max-pool-size: 50       # 最大线程数
    queue-capacity: 200     # 任务队列容量
    keep-alive-seconds: 60  # 空闲线程存活时间
    await-termination-seconds: 30  # 关闭时等待任务完成时间

# 阿里云 DashScope（通义千问）API 配置
dashscope:
  api-key: sk-be31fa96deca4def9511f003c28084b8
